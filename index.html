<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backgammon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="grain-overlay" aria-hidden="true"></div>

  <!-- API Key Modal -->
  <div id="api-modal" class="modal-overlay">
    <div class="modal-box">
      <span class="modal-eyebrow">Welcome</span>
      <h2>Backgammon</h2>
      <p>Enter your OpenAI API key to begin.</p>
      <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off" />
      <button id="api-key-submit">Enter the table</button>
    </div>
  </div>

  <div id="app" class="hidden">
    <header id="masthead">
      <span class="masthead-mark">B</span>
      <h1 class="masthead-title">Backgammon<span class="masthead-dot">.</span></h1>
      <span class="masthead-meta">Human <span class="vs">vs</span> GPT</span>
    </header>

    <div id="turn-indicator">Your turn — Roll the dice</div>

    <!-- AI strategy + AI bear-off (top zone) -->
    <div class="board-zone board-zone--top">
      <div id="ai-strategy-box" class="hidden">
        <span class="strategy-label">AI Strategy</span>
        <span id="ai-strategy-text"></span>
      </div>
      <div class="bear-off-tray" id="bear-off-ai">
        <span class="tray-label">AI · Borne Off</span>
        <div class="tray-checkers" id="tray-ai"></div>
        <span class="tray-frame" aria-hidden="true"></span>
      </div>
    </div>

    <div id="game-area">
      <div id="board">
        <!-- Top row: indices 12–17 | bar | 18–23 (left to right) -->
        <div id="top-row" class="point-row">
          <div class="half-row" id="top-left"></div>
          <div class="bar" id="bar-top"></div>
          <div class="half-row" id="top-right"></div>
        </div>

        <!-- Bottom row: indices 11–6 | bar | 5–0 (left to right) -->
        <div id="bottom-row" class="point-row">
          <div class="half-row" id="bottom-left"></div>
          <div class="bar" id="bar-bottom"></div>
          <div class="half-row" id="bottom-right"></div>
        </div>
      </div>
    </div>

    <!-- Human bear-off (bottom zone) -->
    <div class="board-zone board-zone--bottom">
      <div class="bear-off-tray" id="bear-off-human">
        <span class="tray-label">You · Borne Off</span>
        <div class="tray-checkers" id="tray-human"></div>
        <span class="tray-frame" aria-hidden="true"></span>
      </div>
    </div>

    <div id="controls">
      <button id="roll-btn">
        <span class="btn-label">Roll Dice</span>
        <span class="btn-shimmer" aria-hidden="true"></span>
      </button>
      <div id="dice-area"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
